name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r backend/requirements.txt

    - name: Build EXE with PyInstaller (standalone)
      run: |
        pyinstaller --onefile --windowed --name "ERP-Lite" --add-data "backend;backend" --add-data "frontend;frontend" --add-data "data;data" --hidden-import=waitress --hidden-import=flask --hidden-import=flask_cors --hidden-import=flask_jwt_extended --hidden-import=bcrypt --hidden-import=openpyxl --hidden-import=yaml --hidden-import=cryptography --hidden-import=jinja2 --hidden-import=markupsafe --hidden-import=click --hidden-import=itsdangerous --hidden-import=werkzeug --hidden-import=et_xmlfile --hidden-import=cffi --hidden-import=pycparser --hidden-import=blinker --collect-all waitress --collect-all flask --collect-all flask_cors --collect-all flask_jwt_extended --collect-all bcrypt --collect-all openpyxl --collect-all pyyaml --collect-all cryptography --collect-all jinja2 --collect-all markupsafe --collect-all click --collect-all itsdangerous --collect-all werkzeug --collect-all et_xmlfile --collect-all cffi --collect-all pycparser --collect-all blinker wsgi.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ERP-Lite
        path: dist/ERP-Lite.exe

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/ERP-Lite.exe
