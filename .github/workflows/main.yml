name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r backend/requirements.txt

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "ERP-Lite" --add-data "backend;backend" --add-data "frontend;frontend" --add-data "data;data" --hidden-import=waitress --hidden-import=flask --hidden-import=flask_cors --hidden-import=flask_jwt_extended --hidden-import=bcrypt --hidden-import=openpyxl --hidden-import=yaml --hidden-import=cryptography wsgi.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ERP-Lite
        path: dist/ERP-Lite.exe
